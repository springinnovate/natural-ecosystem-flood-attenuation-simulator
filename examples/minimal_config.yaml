inputs:
  dem: data/dem.tif
  area_of_interest: data/area_of_interest.gpkg
  storm_footprint: data/storm_footprint.gpkg

rainfall:
  series:
    - time_minutes: 0
      rate_mm_per_hr: 0
    - time_minutes: 15
      rate_mm_per_hr: 10
    - time_minutes: 30
      rate_mm_per_hr: 30
    - time_minutes: 45
      rate_mm_per_hr: 60
    - time_minutes: 60
      rate_mm_per_hr: 25
    - time_minutes: 90
      rate_mm_per_hr: 5

simulation_time:
  time_step_seconds: 5
  max_time_step_seconds: 30
  total_runtime_seconds: 7200

output:
  directory: outputs/example
  snapshots:
    directory: snapshots
    interval_minutes: 15
    max_depth_meters: 1.0

processing:
  area_of_interest:
    filters:
      name: United States
